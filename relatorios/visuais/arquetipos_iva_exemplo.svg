<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">
  <defs>
    <linearGradient id="fundo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf3f8"/>
      <stop offset="55%" stop-color="#f7effc"/>
      <stop offset="100%" stop-color="#eef0fc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="700" fill="url(#fundo)"/>
  <circle cx="740" cy="60" r="90" fill="#f3d9ea" opacity="0.35"/>
  <circle cx="60" cy="660" r="110" fill="#dcd2f5" opacity="0.35"/>

  <text x="400" y="50" text-anchor="middle" font-size="26" fill="#5b3a8f" font-weight="bold">Os 10 Arquétipos do seu mapa</text>
  <text x="400" y="76" text-anchor="middle" font-size="14" fill="#8a7ba3">Ivã · como cada energia se relaciona com o seu centro (Mestre do Dia: Mu 戊)</text>

  <!-- Par 1 -->
  <text x="70" y="112" font-size="12" fill="#a58cc6" font-style="italic" letter-spacing="2">RELAÇÕES DE IGUAL</text>
  <rect x="70" y="120" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="90" y="148" font-size="16" fill="#b0a6c4">Companheiro 比肩</text>
  <text x="90" y="170" font-size="12" fill="#c4bad6">ausente — você funciona como referência solitária</text>
  <rect x="410" y="120" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="430" y="148" font-size="16" fill="#b0a6c4">Rival 劫財</text>
  <text x="430" y="170" font-size="12" fill="#c4bad6">ausente — competição não te move</text>

  <!-- Par 2 -->
  <text x="70" y="226" font-size="12" fill="#a58cc6" font-style="italic" letter-spacing="2">EXPRESSÃO CRIATIVA</text>
  <rect x="70" y="234" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="90" y="262" font-size="16" fill="#b0a6c4">Deus do Alimento 食神</text>
  <text x="90" y="284" font-size="12" fill="#c4bad6">ausente — sua criação nasce da crítica, não do lazer</text>
  <rect x="410" y="234" width="320" height="72" rx="12" fill="#8a63c9" stroke="#6d47ab"/>
  <text x="430" y="262" font-size="16" fill="#ffffff" font-weight="bold">Oficial Ferido 傷官 ●</text>
  <text x="430" y="284" font-size="12" fill="#f0e8fc">o olhar que vê o que está errado — e como melhorar</text>

  <!-- Par 3 -->
  <text x="70" y="340" font-size="12" fill="#a58cc6" font-style="italic" letter-spacing="2">GERAÇÃO DE VALOR</text>
  <rect x="70" y="348" width="320" height="72" rx="12" fill="#5b3a8f" stroke="#43296b"/>
  <text x="90" y="376" font-size="16" fill="#ffffff" font-weight="bold">Riqueza Indireta 偏財 ●●</text>
  <text x="90" y="398" font-size="12" fill="#e8ddfb">DOMINANTE — o caçador de oportunidades</text>
  <rect x="410" y="348" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="430" y="376" font-size="16" fill="#b0a6c4">Riqueza Direta 正財</text>
  <text x="430" y="398" font-size="12" fill="#c4bad6">ausente — salário fixo não é seu caminho natural</text>

  <!-- Par 4 -->
  <text x="70" y="454" font-size="12" fill="#a58cc6" font-style="italic" letter-spacing="2">ORDEM E AUTORIDADE</text>
  <rect x="70" y="462" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="90" y="490" font-size="16" fill="#b0a6c4">Oficial Direto 正官</text>
  <text x="90" y="512" font-size="12" fill="#c4bad6">ausente — hierarquia não tem morada no seu mapa</text>
  <rect x="410" y="462" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="430" y="490" font-size="16" fill="#b0a6c4">Oficial Indireto 偏官</text>
  <text x="430" y="512" font-size="12" fill="#c4bad6">ausente — pressão externa não te comanda</text>

  <!-- Par 5 -->
  <text x="70" y="568" font-size="12" fill="#a58cc6" font-style="italic" letter-spacing="2">SABER E AMPARO</text>
  <rect x="70" y="576" width="320" height="72" rx="12" fill="#9d7fd1" stroke="#7c5cb8"/>
  <text x="90" y="604" font-size="16" fill="#ffffff" font-weight="bold">Selo Direto 正印 ◐</text>
  <text x="90" y="626" font-size="12" fill="#f0e8fc">presença leve — o amparo do conhecimento</text>
  <rect x="410" y="576" width="320" height="72" rx="12" fill="#ffffff" stroke="#e6dcf3"/>
  <text x="430" y="604" font-size="16" fill="#b0a6c4">Selo Indireto 偏印</text>
  <text x="430" y="626" font-size="12" fill="#c4bad6">ausente</text>

  <text x="400" y="682" text-anchor="middle" font-size="11" fill="#a58cc6">●● dominante · ● ativo · ◐ presença leve · claro = ausente — e cada ausência também conta a sua história</text>
</svg>
