<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SAJU Brasil — teste</title>
<style>
  :root { --roxo:#5b3a8f; --fundo:#f7f4fb; --borda:#ddd3ee; }
  * { box-sizing:border-box; }
  body { font-family:system-ui,sans-serif; margin:0; background:var(--fundo); color:#2a2135; }
  header { background:var(--roxo); color:#fff; padding:16px 24px; }
  header h1 { margin:0; font-size:20px; }
  main { max-width:880px; margin:24px auto; padding:0 16px; }
  .abas { display:flex; gap:8px; margin-bottom:16px; }
  .abas button { padding:8px 18px; border:1px solid var(--borda); background:#fff; border-radius:20px; cursor:pointer; font-size:14px; }
  .abas button.ativa { background:var(--roxo); color:#fff; border-color:var(--roxo); }
  form { background:#fff; border:1px solid var(--borda); border-radius:12px; padding:18px; display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; }
  label { font-size:12px; color:#6b5a85; display:block; margin-bottom:4px; }
  input,select { width:100%; padding:8px; border:1px solid var(--borda); border-radius:8px; font-size:14px; }
  .acao { grid-column:1/-1; }
  .acao button { background:var(--roxo); color:#fff; border:none; padding:10px 26px; border-radius:8px; font-size:15px; cursor:pointer; }
  .grupo { grid-column:1/-1; font-weight:600; color:var(--roxo); border-top:1px dashed var(--borda); padding-top:10px; }
  pre { background:#1f1830; color:#e8ddfb; padding:16px; border-radius:12px; overflow:auto; font-size:12px; max-height:480px; }
  .oculto { display:none; }
  .nota { font-size:12px; color:#8a7ba3; margin:8px 2px; }
</style>
</head>
<body>
<header><h1>🔮 SAJU Brasil — painel de teste</h1></header>
<main>
  <div class="abas">
    <button class="ativa" data-aba="leitura">Leitura individual</button>
    <button data-aba="sinastria">Sinastria</button>
    <button data-aba="diaria">Sorte diária</button>
  </div>

  <form id="f-leitura">
    <div><label>Data de nascimento</label><input name="data" type="date" required value="1990-01-01"></div>
    <div><label>Hora (vazio = desconhecida)</label><input name="hora" type="time" value="12:00"></div>
    <div><label>Cidade</label><input name="cidade" list="cidades" required value="São Paulo" autocomplete="off"></div>
    <div><label>Sexo</label><select name="sexo"><option value="female">Feminino</option><option value="male">Masculino</option></select></div>
    <div class="acao"><button>Calcular leitura</button></div>
  </form>

  <form id="f-sinastria" class="oculto">
    <div class="grupo">Pessoa 1</div>
    <div><label>Data</label><input name="data1" type="date" required value="1990-01-01"></div>
    <div><label>Hora</label><input name="hora1" type="time" value="12:00"></div>
    <div><label>Cidade</label><input name="cidade1" list="cidades" required value="São Paulo" autocomplete="off"></div>
    <div><label>Sexo</label><select name="sexo1"><option value="female">Feminino</option><option value="male">Masculino</option></select></div>
    <div class="grupo">Pessoa 2</div>
    <div><label>Data</label><input name="data2" type="date" required value="1992-07-20"></div>
    <div><label>Hora</label><input name="hora2" type="time" value="14:30"></div>
    <div><label>Cidade</label><input name="cidade2" list="cidades" required value="Manaus" autocomplete="off"></div>
    <div><label>Sexo</label><select name="sexo2"><option value="male">Masculino</option><option value="female">Feminino</option></select></div>
    <div class="acao"><button>Calcular sinastria</button></div>
  </form>

  <form id="f-diaria" class="oculto">
    <div><label>Data de nascimento</label><input name="data" type="date" required value="1990-01-01"></div>
    <div><label>Hora</label><input name="hora" type="time" required value="12:00"></div>
    <div><label>Cidade</label><input name="cidade" list="cidades" required value="São Paulo" autocomplete="off"></div>
    <div><label>Sexo</label><select name="sexo"><option value="female">Feminino</option><option value="male">Masculino</option></select></div>
    <div><label>Dia-alvo</label><input name="alvo" type="date"></div>
    <div class="acao"><button>Consultar dia</button></div>
  </form>

  <datalist id="cidades"></datalist>
  <p class="nota">O resultado abaixo é o JSON do backend. No app final, a chave <code>prompt</code> alimenta o LLM que escreve o relatório narrativo (ou use <code>gerarRelatorio: true</code> com ANTHROPIC_API_KEY no servidor).</p>
  <pre id="saida">Preencha o formulário e calcule.</pre>
</main>
<script>
const abas = document.querySelectorAll('.abas button');
abas.forEach(b => b.onclick = () => {
  abas.forEach(x => x.classList.remove('ativa')); b.classList.add('ativa');
  ['leitura','sinastria','diaria'].forEach(a =>
    document.getElementById('f-'+a).classList.toggle('oculto', a !== b.dataset.aba));
});

// autocomplete de cidades
fetch('/cidades').then(r=>r.json()).then(l => {
  document.getElementById('cidades').innerHTML =
    l.map(c => '<option value="'+c.nome+'">'+c.nome+' – '+c.uf+'</option>').join('');
});
document.querySelectorAll('input[list=cidades]').forEach(i => i.addEventListener('input', async e => {
  const l = await (await fetch('/cidades?q='+encodeURIComponent(e.target.value))).json();
  document.getElementById('cidades').innerHTML =
    l.map(c => '<option value="'+c.nome+'">'+c.nome+' – '+c.uf+'</option>').join('');
}));

const saida = document.getElementById('saida');
async function postar(rota, corpo) {
  saida.textContent = 'Calculando…';
  const r = await fetch(rota, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(corpo) });
  saida.textContent = JSON.stringify(await r.json(), null, 2);
}
document.getElementById('f-leitura').onsubmit = e => { e.preventDefault();
  const f = new FormData(e.target);
  postar('/leitura', { data:f.get('data'), hora:f.get('hora')||undefined, cidade:f.get('cidade'), sexo:f.get('sexo') });
};
document.getElementById('f-sinastria').onsubmit = e => { e.preventDefault();
  const f = new FormData(e.target);
  postar('/sinastria', {
    pessoa1:{ data:f.get('data1'), hora:f.get('hora1')||undefined, cidade:f.get('cidade1'), sexo:f.get('sexo1') },
    pessoa2:{ data:f.get('data2'), hora:f.get('hora2')||undefined, cidade:f.get('cidade2'), sexo:f.get('sexo2') },
  });
};
document.getElementById('f-diaria').onsubmit = e => { e.preventDefault();
  const f = new FormData(e.target);
  postar('/diaria', { data:f.get('data'), hora:f.get('hora'), cidade:f.get('cidade'), sexo:f.get('sexo'), alvo:f.get('alvo')||undefined });
};
</script>
</body>
</html>
